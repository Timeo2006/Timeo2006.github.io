<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bibliothèque Galaxie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #00000f;
      --surface: rgba(4,3,15,0.97);
      --border: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.9);
      --text-dim: rgba(255,255,255,0.45);
      --text-faint: rgba(255,255,255,0.25);
      --accent: rgba(167,139,250,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }

    /* ── TOP BAR ── */
    .top-bar {
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 50;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .menu-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text);
      font-size: 18px;
    }

    .top-clock {
      display: flex;
      flex-direction: column;
    }
    .top-clock .time {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .top-clock .date {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .weather-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
    }
    .weather-pill .temp { font-size: 13px; font-weight: 700; color: #fff; }
    .weather-pill .wicon { font-size: 16px; }

    .session-pill {
      background: rgba(255,255,255,0.05);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── CANVAS AREA ── */
    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    canvas { position: absolute; top: 0; left: 0; }
    #lines { pointer-events: none; }

    .nodes-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .node-label {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: transform 0.18s, opacity 0.2s;
      z-index: 10;
    }
    .node-label.dimmed { opacity: 0.2; }
    .node-icon {
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .node-text {
      font-size: 10px;
      font-weight: 500;
      color: #fff;
      margin-top: 4px;
      text-align: center;
      background: rgba(0,0,0,0.7);
      padding: 2px 7px;
      border-radius: 4px;
      border: 0.5px solid rgba(255,255,255,0.12);
      white-space: nowrap;
    }
    .center-orb {
      position: absolute;
      transform: translate(-50%,-50%);
      z-index: 20;
    }
    .zoom-hint {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      z-index: 30;
    }

    /* ── SEARCH BAR ── */
    .search-bar {
      padding: 10px 16px;
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
    }
    .search-bar i { font-size: 16px; color: var(--text-faint); flex-shrink: 0; }
    .search-bar input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 14px;
      color: #fff;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
    }
    .search-bar input::placeholder { color: var(--text-faint); }
    .search-bar input:focus { border-color: rgba(167,139,250,0.5); }

    .search-results-overlay {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 16px; right: 16px;
      background: rgba(8,6,24,0.97);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      max-height: 240px;
      overflow-y: auto;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
      z-index: 100;
    }
    .search-results-overlay.visible { display: flex; }
    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      border-bottom: 0.5px solid var(--border);
      transition: background 0.1s;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:active { background: rgba(255,255,255,0.08); }
    .result-item .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      margin-left: auto;
      background: rgba(255,255,255,0.08);
      color: var(--text-dim);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      padding: 8px 0 calc(var(--safe-bottom) + 8px);
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
    }

    .nav-shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 12px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s, transform 0.15s;
      text-decoration: none;
      border-radius: 12px;
    }
    .nav-shortcut:active { opacity: 1; transform: scale(0.92); }
    .nav-shortcut img { width: 28px; height: 28px; object-fit: contain; }
    .nav-shortcut span { font-size: 9px; color: var(--text-dim); }

    /* ── DRAWER SIDEBAR ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: rgba(5,4,18,0.98);
      border-right: 0.5px solid rgba(255,255,255,0.1);
      z-index: 201;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .drawer-header h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .close-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px calc(var(--safe-bottom) + 12px);
      -webkit-overflow-scrolling: touch;
    }

    .tree-section { margin-bottom: 4px; }
    .tree-cat {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      transition: background 0.12s;
    }
    .tree-cat:active { background: rgba(255,255,255,0.08); }

    .tree-sub {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 10px 10px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      transition: background 0.1s;
    }
    .tree-sub:active { background: rgba(255,255,255,0.07); color: #fff; }

    .tree-subsub {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px 9px 44px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      transition: background 0.1s;
    }
    .tree-subsub:active { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.85); }

    .tree-file {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px 9px 44px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s;
    }
    .tree-file:active { background: rgba(255,255,255,0.05); }

    /* Scrollbar fin */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  </style>
</head>

<script>
// ─── HORLOGE ───
function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent=`${h}:${m}:${s}`;
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  document.getElementById('clock-date').textContent=`${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]}`;
}
updateClock(); setInterval(updateClock,1000);

// ─── SESSION ───
const sessionStart=Date.now();
function updateSession(){
  const s=Math.floor((Date.now()-sessionStart)/1000);
  const h=Math.floor(s/3600),min=Math.floor((s%3600)/60),sec=s%60;
  const txt=h>0?`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  document.getElementById('session-time').textContent=txt;
}
setInterval(updateSession,1000); updateSession();

// ─── MÉTÉO ───
async function loadWeather(){
  try{
    const geo=await fetch('https://ipapi.co/json/').then(r=>r.json());
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current_weather=true`).then(r=>r.json());
    const icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'❄️',80:'🌦️',95:'⛈️'};
    document.getElementById('weather-icon').textContent=icons[w.current_weather.weathercode]||'🌡️';
    document.getElementById('weather-temp').textContent=`${Math.round(w.current_weather.temperature)}°C`;
  }catch(e){}
}
loadWeather();

// ─── DRAWER ───
const drawer=document.getElementById('drawer');
const overlay=document.getElementById('drawer-overlay');
function openDrawer(){drawer.classList.add('open');overlay.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');overlay.classList.remove('open');}
document.getElementById('menu-btn').addEventListener('click',openDrawer);
document.getElementById('close-btn').addEventListener('click',closeDrawer);
overlay.addEventListener('click',closeDrawer);

// Swipe to close drawer
let swipeStartX=null;
drawer.addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;},{passive:true});
drawer.addEventListener('touchend',e=>{
  if(swipeStartX!==null&&e.changedTouches[0].clientX-swipeStartX<-60) closeDrawer();
  swipeStartX=null;
},{passive:true});

const allItems=[];
cats.forEach(cat=>{
  allItems.push({id:cat.id,name:cat.name,icon:cat.icon,color:cat.color,parent:null,parentName:null,link:cat.link});
  cat.children.forEach(sub=>allItems.push({id:sub.id,name:sub.name,icon:sub.icon,color:cat.color,parent:cat.id,parentName:cat.name,link:sub.link}));
});

// ─── CANVAS ───
let W,H,cx,cy,activeId=null,searchQuery='';
let scale=1,offsetX=0,offsetY=0;
let animT=0;
const area=document.getElementById('canvas-area');
const bgC=document.getElementById('bg'),lC=document.getElementById('lines');
const bctx=bgC.getContext('2d'),lctx=lC.getContext('2d');
const nodesEl=document.getElementById('nodes');
const nodesContainer=document.getElementById('nodes-container');
const pos={};

// Touch: pinch + pan
let touches={};
let lastDist=null,lastMid=null,panStart=null,panStartOX=0,panStartOY=0;

area.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{ touches[t.identifier]=t; });
  const tArr=Object.values(touches);
  if(tArr.length===1){ panStart={x:tArr[0].clientX,y:tArr[0].clientY}; panStartOX=offsetX; panStartOY=offsetY; lastDist=null; }
  if(tArr.length===2){ lastDist=null; panStart=null; }
},{passive:false});

area.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{ touches[t.identifier]=t; });
  const tArr=Object.values(touches);
  if(tArr.length===1&&panStart){
    offsetX=panStartOX+(tArr[0].clientX-panStart.x);
    offsetY=panStartOY+(tArr[0].clientY-panStart.y);
    applyTransform();
  }
  if(tArr.length===2){
    const dx=tArr[1].clientX-tArr[0].clientX,dy=tArr[1].clientY-tArr[0].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastDist!==null){
      const delta=dist-lastDist;
      scale=Math.min(3,Math.max(0.3,scale+delta*0.01));
      applyTransform(); drawLines();
    }
    lastDist=dist;
  }
},{passive:false});

area.addEventListener('touchend',e=>{
  Array.from(e.changedTouches).forEach(t=>{ delete touches[t.identifier]; });
  if(Object.keys(touches).length<2){ lastDist=null; }
},{passive:true});

function applyTransform(){
  const t=`translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  nodesContainer.style.transform=t;
  nodesContainer.style.transformOrigin='center center';
  lC.style.transform=t;
  lC.style.transformOrigin='center center';
}

function computePositions(){
  const R1=Math.min(W,H)*0.28;
  cats.forEach(cat=>{
    const rad=cat.angle*Math.PI/180;
    pos[cat.id]={x:cx+Math.cos(rad)*R1,y:cy+Math.sin(rad)*R1};
    cat.children.forEach(sub=>{
      const perpRad=(cat.angle+90)*Math.PI/180;
      let childR=Math.min(W,H)*0.48;
      if(cat.id==="pro") childR=Math.min(W,H)*0.50;
      if(cat.id==="bim") childR=Math.min(W,H)*0.42;
      pos[sub.id]={
        x:cx+Math.cos(rad)*childR+Math.cos(perpRad)*sub.offset,
        y:cy+Math.sin(rad)*childR+Math.sin(perpRad)*sub.offset
      };
    });
  });
}

function resize(){
  W=area.clientWidth; H=area.clientHeight; cx=W/2; cy=H/2;
  bgC.width=lC.width=W; bgC.height=lC.height=H;
  computePositions(); drawLines(); positionNodes(); positionOrb();
}

// ─── GALAXY ───
const STARS=[];
function initStars(){
  STARS.length=0;
  const rng=s=>{let x=s;return()=>{x=Math.sin(x)*99999;return x-Math.floor(x);}};
  const r=rng(42);
  for(let i=0;i<400;i++) STARS.push({x:r()*2-1,y:r()*2-1,size:r()*0.8+0.1,bright:r()*0.4+0.05,twinkle:r()*0.04+0.005,phase:r()*Math.PI*2,type:'bg'});
  for(let arm=0;arm<3;arm++){
    for(let i=0;i<200;i++){
      const t=i/200;
      const angle=t*4*Math.PI+arm*(Math.PI*2/3);
      const radius=t*0.85+0.02;
      const spread=(1-t)*0.08+0.01;
      const rng2=rng(arm*1000+i);
      const x=Math.cos(angle)*radius+(rng2()-0.5)*spread*2;
      const y=Math.sin(angle)*radius*0.55+(rng2()-0.5)*spread;
      const bright=0.3+t*0.5+rng2()*0.3;
      const blue=r()<0.3;
      STARS.push({x,y,size:rng2()*1.2+0.3,bright:Math.min(bright,1),twinkle:rng2()*0.03+0.003,phase:rng2()*Math.PI*2,type:'spiral',blue});
    }
  }
  for(let i=0;i<80;i++){
    const ang=r()*Math.PI*2,rad=r()*0.12;
    STARS.push({x:Math.cos(ang)*rad,y:Math.sin(ang)*rad*0.5,size:r()*1.8+0.4,bright:r()*0.7+0.4,twinkle:r()*0.02+0.002,phase:r()*Math.PI*2,type:'core'});
  }
}

function drawGalaxy(){
  bctx.clearRect(0,0,W,H);
  bctx.fillStyle='#00000f'; bctx.fillRect(0,0,W,H);
  const halo=bctx.createRadialGradient(cx,cy,0,cx,cy,W*0.25);
  halo.addColorStop(0,'rgba(40,20,100,0.35)');
  halo.addColorStop(0.4,'rgba(20,8,60,0.18)');
  halo.addColorStop(1,'transparent');
  bctx.fillStyle=halo; bctx.fillRect(0,0,W,H);
  const t=animT,rotAngle=t*0.0002;
  STARS.forEach(s=>{
    let sx,sy;
    if(s.type==='bg'){ sx=((s.x+1)/2)*W; sy=((s.y+1)/2)*H; }
    else{
      const cosR=Math.cos(rotAngle),sinR=Math.sin(rotAngle);
      const rx=s.x*cosR-s.y*sinR,ry=s.x*sinR+s.y*cosR;
      sx=cx+rx*(W*1.20); sy=cy+ry*(H*1.20);
    }
    const twinkle=s.bright*(0.7+0.3*Math.sin(t*s.twinkle+s.phase));
    let color;
    if(s.type==='core') color=`rgba(220,200,255,${twinkle})`;
    else if(s.blue) color=`rgba(160,180,255,${twinkle})`;
    else color=`rgba(255,255,255,${twinkle})`;
    bctx.beginPath(); bctx.arc(sx,sy,s.size,0,Math.PI*2); bctx.fillStyle=color; bctx.fill();
  });
}

function loop(){ animT++; drawGalaxy(); requestAnimationFrame(loop); }

function getMatchIds(){
  if(!searchQuery) return null;
  return new Set(allItems.filter(i=>i.name.toLowerCase().includes(searchQuery.toLowerCase())).map(i=>i.id));
}

function drawLines(){
  lctx.clearRect(0,0,W,H);
  const matchIds=getMatchIds();
  cats.forEach(cat=>{
    const catMatch=!matchIds||matchIds.has(cat.id)||cat.children.some(s=>matchIds.has(s.id));
    const isActiveCat=activeId===cat.id||cat.children.some(s=>s.id===activeId);
    drawCurve({x:cx,y:cy},pos[cat.id],cat.color,isActiveCat,catMatch?(isActiveCat?2.2:1.0):0.15);
    cat.children.forEach(sub=>{
      const subMatch=!matchIds||matchIds.has(sub.id);
      const isActive=activeId===sub.id||activeId===cat.id;
      drawCurve(pos[cat.id],pos[sub.id],cat.color,isActive,subMatch?(isActive?1.6:0.75):0.12);
    });
  });
}

function drawCurve(from,to,color,active,lw){
  lctx.beginPath(); lctx.moveTo(from.x,from.y);
  const mx=(from.x+to.x)/2+(to.y-from.y)*0.15,my=(from.y+to.y)/2-(to.x-from.x)*0.15;
  lctx.quadraticCurveTo(mx,my,to.x,to.y);
  if(active){ lctx.shadowColor=color; lctx.shadowBlur=14; lctx.strokeStyle=color; lctx.setLineDash([]); }
  else{ lctx.shadowBlur=0; lctx.strokeStyle='rgba(200,200,255,0.2)'; lctx.setLineDash([4,5]); }
  lctx.lineWidth=lw; lctx.stroke(); lctx.setLineDash([]); lctx.shadowBlur=0;
}

function positionNodes(){
  nodesEl.innerHTML='';
  const matchIds=getMatchIds();
  cats.forEach(cat=>{
    const catMatch=!matchIds||matchIds.has(cat.id)||cat.children.some(s=>matchIds.has(s.id));
    createNode(cat,pos[cat.id],50,20,cat.glow,catMatch);
    cat.children.forEach(sub=>createNode(sub,pos[sub.id],38,16,null,!matchIds||matchIds.has(sub.id)));
  });
}

function createNode(item,p,size,iconSize,glow,visible){
  const el=document.createElement('div');
  el.className='node-label'+(visible===false?' dimmed':'');
  el.style.left=p.x+'px'; el.style.top=p.y+'px';
  const shadow=glow?`0 0 22px ${glow},0 0 6px ${glow}`:'none';
  el.innerHTML=`<div class="node-icon" style="width:${size}px;height:${size}px;font-size:${iconSize}px;background:${item.bg};border:0.5px solid ${item.border};box-shadow:${shadow};"><i class="ti ${item.icon}" style="color:${item.color}"></i></div><span class="node-text">${item.name}</span>`;
  el.addEventListener('touchstart',()=>{ activeId=item.id; drawLines(); },{passive:true});
  el.addEventListener('touchend',()=>{ activeId=null; drawLines(); },{passive:true});
  el.addEventListener('click',()=>{ if(item.link) window.open(item.link,'_blank'); });
  nodesEl.appendChild(el);
}

function positionOrb(){
  let orb=document.getElementById('center-orb');
  if(!orb){ orb=document.createElement('div'); orb.id='center-orb'; orb.className='center-orb'; area.appendChild(orb); }
  orb.style.left=cx+'px'; orb.style.top=cy+'px';
  orb.innerHTML=`<div style="width:70px;height:70px;border-radius:50%;overflow:hidden;border:2px solid rgba(160,140,255,0.55);box-shadow:0 0 40px rgba(110,90,255,0.7),0 0 14px rgba(110,90,255,0.4);"><img src="https://i.pinimg.com/736x/a8/25/f3/a825f3568f19afa30c70add8a0e600d4.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/></div>`;
}

function buildTree(){
  const container=document.getElementById('tree');
  cats.forEach(cat=>{
    const section=document.createElement('div'); section.className='tree-section';
    const catEl=document.createElement('div'); catEl.className='tree-cat';
    catEl.innerHTML=`<i class="ti ${cat.icon}" style="color:${cat.color};font-size:18px;"></i><span>${cat.name}</span>`;
    if(cat.link) catEl.addEventListener('click',()=>{ window.open(cat.link,'_blank'); closeDrawer(); });
    section.appendChild(catEl);
    cat.children.forEach(s=>{
      const subEl=document.createElement('div'); subEl.className='tree-sub';
      subEl.innerHTML=`<i class="ti ${s.icon}" style="color:${cat.color};font-size:15px;"></i><span>${s.name}</span>`;
      if(s.link) subEl.addEventListener('click',()=>{ window.open(s.link,'_blank'); closeDrawer(); });
      section.appendChild(subEl);
      if(s.children&&s.children.length){
        s.children.forEach(ss=>{
          const ssEl=document.createElement('div'); ssEl.className='tree-subsub';
          ssEl.innerHTML=`<i class="ti ${ss.icon}" style="color:${cat.color};font-size:13px;"></i><span style="color:rgba(255,255,255,0.5)">${ss.name}</span>`;
          if(ss.link) ssEl.addEventListener('click',()=>{ window.open(ss.link,'_blank'); closeDrawer(); });
          section.appendChild(ssEl);
        });
      }
      if(s.files&&s.files.length){
        s.files.forEach(f=>{
          const fileEl=document.createElement('div'); fileEl.className='tree-file';
          fileEl.innerHTML=`<i class="ti ${f.icon}" style="color:${cat.color};font-size:13px;"></i><span style="color:${cat.color};opacity:0.85">${f.name}</span>`;
          if(f.link) fileEl.addEventListener('click',()=>{ window.open(f.link,'_blank'); closeDrawer(); });
          section.appendChild(fileEl);
        });
      }
    });
    container.appendChild(section);
  });
}

// ─── RECHERCHE ───
const searchInput=document.getElementById('search-input');
const searchResults=document.getElementById('search-results');
searchInput.addEventListener('input',()=>{
  searchQuery=searchInput.value.trim();
  if(!searchQuery){ searchResults.innerHTML=''; searchResults.classList.remove('visible'); positionNodes(); drawLines(); return; }
  const matches=allItems.filter(i=>i.name.toLowerCase().includes(searchQuery.toLowerCase()));
  searchResults.innerHTML='';
  if(!matches.length){
    searchResults.innerHTML=`<div style="font-size:13px;color:rgba(255,255,255,0.3);padding:14px 16px;">Aucun résultat</div>`;
  } else {
    matches.forEach(m=>{
      const div=document.createElement('div'); div.className='result-item';
      div.innerHTML=`<i class="ti ${m.icon}" style="color:${m.color};font-size:18px;"></i><span>${m.name}</span>${m.parentName?`<span class="badge">${m.parentName}</span>`:''}`;
      div.addEventListener('click',()=>{
        if(m.link) window.open(m.link,'_blank');
        searchInput.value=''; searchQuery=''; searchResults.innerHTML=''; searchResults.classList.remove('visible');
        positionNodes(); drawLines();
      });
      searchResults.appendChild(div);
    });
  }
  searchResults.classList.add('visible');
  positionNodes(); drawLines();
});

// Fermer résultats si on tape ailleurs
document.addEventListener('touchstart',e=>{
  if(!searchInput.contains(e.target)&&!searchResults.contains(e.target)){
    searchResults.innerHTML=''; searchResults.classList.remove('visible');
    searchInput.blur();
  }
},{passive:true});

// ─── INIT ───
buildTree();
window.addEventListener('resize',resize);
initStars();
resize();
loop();
</script>
